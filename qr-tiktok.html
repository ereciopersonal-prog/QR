<style>
body{font-family:Arial;background:#ece6f2;margin:0;text-align:center;color:#6a00a8;}
header{background:linear-gradient(135deg,#6a00a8,#ff2fd1);padding:30px;}
.logo-main{width:220px;margin:auto;display:block;}
nav{margin:20px;}
nav a{margin:6px 10px;color:#6a00a8;font-weight:bold;text-decoration:none;}
.container{background:linear-gradient(135deg,#6a00a8,#ff2fd1);padding:30px;border-radius:20px;max-width:600px;margin:auto;color:white;}
input{padding:12px;width:90%;margin:10px;border:none;border-radius:8px;}
button{padding:12px 25px;background:#fff4c2;color:#6a00a8;border:none;border-radius:25px;font-weight:bold;}
#qrcode{display:flex;justify-content:center;margin-top:25px;}
.download-btn{display:none;margin-top:15px;}
.ad-box{margin:30px auto;max-width:728px;height:90px;background:#ddd;display:flex;align-items:center;justify-content:center;border-radius:10px;}
footer{background:linear-gradient(135deg,#6a00a8,#ff2fd1);color:#fff4c2;padding:20px;margin-top:60px;}
</style>
</head>

<body>

<header><img src="LogoQ.png" class="logo-main"></header>

<nav>
<a href="index.html">Inicio</a>
<a href="qr-whatsapp.html">QR WhatsApp</a>
<a href="qr-wifi.html">QR WiFi</a>
<a href="qr-instagram.html">QR Instagram</a>
<a href="qr-facebook.html">QR Facebook</a>
<a href="qr-tiktok.html">QR TikTok</a>
<a href="qr-tarjeta.html">QR Tarjeta</a>
<a href="ventajas-codigos-qr.html">Ventajas QR</a>
</nav>

<div class="ad-box">Espacio publicitario</div>

<div class="container">
<h2>Generar QR TikTok</h2>
<input id="url" placeholder="https://tiktok.com/@usuario">
<button onclick="generateQR()">Generar QR</button>
<div id="qrcode"></div>
<button id="downloadBtn" class="download-btn" onclick="downloadQR()">Descargar QR</button>
</div>

<div class="ad-box">Espacio publicitario</div>

<footer>© 2026 qrflow.tech</footer>

<script>
function generateQR(){
qrcode.innerHTML="";
new QRCode(qrcode,{text:url.value,width:200,height:200});
downloadBtn.style.display="inline-block";
}
function downloadQR(){
var img=document.querySelector("#qrcode img");
var a=document.createElement("a");
a.href=img.src;a.download="qr-tiktok.png";a.click();
}
</script>

</body>
</html>
