<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>qrflow.tech | QR para WhatsApp</title>
<meta name="description" content="Crea un código QR para enviar mensajes automáticos por WhatsApp. Generador gratis y rápido.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="LogoQ.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

<style>
body{font-family:Arial;background:#ece6f2;margin:0;text-align:center;color:#6a00a8;}
header{background:linear-gradient(135deg,#6a00a8,#ff2fd1);padding:30px;}
.logo-main{width:220px;margin:auto;display:block;}
nav{margin:20px;}
nav a{margin:6px 10px;text-decoration:none;color:#6a00a8;font-weight:bold;}
.container{background:linear-gradient(135deg,#6a00a8,#ff2fd1);padding:30px;border-radius:20px;max-width:600px;margin:auto;color:white;}
input,textarea{padding:12px;width:90%;margin:8px;border:none;border-radius:8px;}
button{padding:12px 25px;background:#fff4c2;color:#6a00a8;border:none;border-radius:25px;font-weight:bold;cursor:pointer;}
#qrcode{margin-top:25px;display:flex;justify-content:center;}
.download-btn{display:none;margin-top:15px;}
footer{background:linear-gradient(135deg,#6a00a8,#ff2fd1);color:#fff4c2;padding:20px;margin-top:60px;}
</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z3CQH3G1CM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-Z3CQH3G1CM');
</script>

</head>
<body>

<header><img src="LogoQ.png" class="logo-main"></header>

<nav>
<a href="index.html">Inicio</a>
<a href="qr-whatsapp.html">QR WhatsApp</a>
</nav>

<div class="container">
<h2>Generar QR WhatsApp</h2>
<input id="telefono" placeholder="34600111222">
<textarea id="mensaje" placeholder="Mensaje"></textarea>
<button onclick="generateQR()">Generar QR</button>
<div id="qrcode"></div>
<button id="downloadBtn" class="download-btn" onclick="downloadQR()">Descargar QR</button>
</div>

<footer>© 2026 qrflow.tech</footer>

<script>
function generateQR(){
document.getElementById("qrcode").innerHTML="";
var url="https://wa.me/"+telefono.value+"?text="+encodeURIComponent(mensaje.value);
new QRCode(qrcode,{text:url,width:200,height:200});
downloadBtn.style.display="inline-block";
}
function downloadQR(){
var img=document.querySelector("#qrcode img");
var a=document.createElement("a");
a.href=img.src;a.download="qr-whatsapp.png";a.click();
}
</script>

</body>
</html>
