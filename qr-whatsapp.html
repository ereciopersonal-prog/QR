<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Código QR para WhatsApp</title>
<meta name="description" content="Crea un código QR para enviar mensajes automáticos por WhatsApp. Generador gratis y rápido. Ideal para negocios y atención al cliente.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="LogoQ.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z3CQH3G1CM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-Z3CQH3G1CM');
</script>

<style>
/* MISMO CSS QUE INDEX */
body{font-family: Arial;background:#ece6f2;margin:0;text-align:center;color:#6a00a8;}
header{background: linear-gradient(135deg,#6a00a8,#ff2fd1);padding:25px;}
.logo{width:180px;}
nav{margin:20px;}
nav a{margin:0 12px;text-decoration:none;color:#6a00a8;font-weight:bold;}
.container{background: linear-gradient(135deg,#6a00a8,#ff2fd1);padding:35px;border-radius:20px;max-width:600px;margin:30px auto;color:white;}
.container h2{font-family:'Lobster',cursive;color:#fff4c2;text-shadow:2px 2px 0 #6a00a8;}
input{padding:12px;width:85%;margin:10px;border:none;border-radius:8px;}
button{padding:12px 25px;background:#fff4c2;color:#6a00a8;border:none;border-radius:25px;font-weight:bold;cursor:pointer;}
#qrcode{display:flex;justify-content:center;margin-top:25px;}
.download-btn{display:none;margin-top:15px;}
.ad-box{max-width:728px;height:90px;margin:30px auto;background:#ddd;display:flex;align-items:center;justify-content:center;border-radius:10px;}
footer{background: linear-gradient(135deg,#6a00a8,#ff2fd1);color:#fff4c2;padding:20px;margin-top:60px;}
</style>
</head>

<body>

<header><img src="LogoQ.png" class="logo"></header>

<nav>
<a href="index.html">Inicio</a>
<a href="qr-whatsapp.html">QR WhatsApp</a>
<a href="qr-wifi.html">QR WiFi</a>
<a href="qr-instagram.html">QR Instagram</a>
<a href="qr-facebook.html">QR Facebook</a>
<a href="qr-tiktok.html">QR TikTok</a>
<a href="qr-tarjeta.html">QR Tarjeta</a>
<a href="ventajas-codigos-qr.html">Ventajas QR</a>
</nav>

<div class="ad-box">Espacio publicitario</div>

<div class="container">
<h2>Generar QR con Mensaje Automático</h2>
<p>Introduce el número y el mensaje que quieres enviar automáticamente.</p>

<input id="telefono" placeholder="Ejemplo: 34600111222">
<input id="mensaje" placeholder="Escribe tu mensaje">

<button onclick="generateQR()">Generar QR</button>

<div id="qrcode"></div>
<button id="downloadBtn" class="download-btn" onclick="downloadQR()">Descargar QR</button>
</div>

<div class="ad-box">Espacio publicitario</div>

<footer>© 2026 Generador de Códigos QR Gratis</footer>

<script>
function generateQR(){
qrcode.innerHTML="";
var url="https://wa.me/"+telefono.value+"?text="+encodeURIComponent(mensaje.value);
new QRCode(qrcode,{text:url,width:200,height:200});
downloadBtn.style.display="inline-block";
}
function downloadQR(){
var img=document.querySelector("#qrcode img");
var a=document.createElement("a");
a.href=img.src;a.download="qr-whatsapp.png";a.click();
}
</script>

</body>
</html>
