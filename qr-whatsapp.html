<!-- ANUNCIO SUPERIOR -->
<div class="ad-box">Espacio publicitario</div>

<div class="container">

<h2>Generar QR WhatsApp</h2>

<input id="telefono" placeholder="Ejemplo: 34600111222">
<textarea id="mensaje" placeholder="Mensaje"></textarea>

<button onclick="generateQR()">Generar QR</button>

<div id="qrcode"></div>

<button id="downloadBtn" class="download-btn" onclick="downloadQR()">Descargar QR</button>

</div>

<!-- ANUNCIO INFERIOR -->
<div class="ad-box">Espacio publicitario</div>

<footer>
© 2026 qrflow.tech
</footer>

<script>

function generateQR(){
qrcode.innerHTML="";

if(telefono.value.trim()==""){
alert("Introduce un número");
return;
}

var url="https://wa.me/"+telefono.value+"?text="+encodeURIComponent(mensaje.value);

new QRCode(qrcode,{
text:url,
width:200,
height:200
});

downloadBtn.style.display="inline-block";
}

function downloadQR(){
var img=document.querySelector("#qrcode img");
var a=document.createElement("a");
a.href=img.src;
a.download="qr-whatsapp.png";
a.click();
}

</script>

</body>
