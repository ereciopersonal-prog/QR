<style>
body{font-family:Arial;background:#ece6f2;margin:0;text-align:center;color:#6a00a8;}

header{background:linear-gradient(135deg,#6a00a8,#ff2fd1);padding:20px;}
.logo{width:180px;}

header h1{
font-family:'Lobster',cursive;
color:#fff4c2;
margin:10px 0 0;
text-shadow:2px 2px 0 #6a00a8;
}

nav{margin:20px;}
nav a{margin:0 12px;color:#6a00a8;text-decoration:none;font-weight:bold;}

.container{
background:linear-gradient(135deg,#6a00a8,#ff2fd1);
padding:35px;
border-radius:20px;
max-width:600px;
margin:30px auto;
color:white;
}

.container h2{
font-family:'Lobster',cursive;
color:#fff4c2;
text-shadow:2px 2px 0 #6a00a8;
}

input{padding:12px;width:85%;margin:10px;border:none;border-radius:8px;}

button{
padding:12px 25px;
background:#fff4c2;
color:#6a00a8;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

#qrcode{display:flex;justify-content:center;margin-top:25px;}
.download{display:none;margin-top:15px;}

footer{
background:linear-gradient(135deg,#6a00a8,#ff2fd1);
color:#fff4c2;
padding:20px;
margin-top:60px;
}
</style>
</head>

<body>

<header>
<img src="LogoQ.png" class="logo">
</header>

<nav>
<a href="index.html">Inicio</a>
<a href="qr-whatsapp.html">QR WhatsApp</a>

<a href="qr-tarjeta.html">QR Tarjeta</a>
<a href="ventajas-codigos-qr.html">Ventajas QR</a>
</nav>

<div class="container">
<h2>Generador de Código QR para Enlaces</h2>
<input id="url" placeholder="https://ejemplo.com">
<button onclick="gen()">Generar QR</button>

<div id="qrcode"></div>
<button class="download" id="d" onclick="down()">Descargar QR</button>
</div>

<footer>© 2026 qrflow.tech</footer>

<script>
function gen(){
qrcode.innerHTML="";
new QRCode(qrcode,{text:url.value,width:200,height:200});
d.style.display="inline-block";
}
function down(){
let img=document.querySelector("#qrcode img");
let a=document.createElement("a");
a.href=img.src;a.download="qr.png";a.click();
}
</script>

</body>
