<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generador QR</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #6D28D9, #A855F7);
  color: #111;
}

.container {
  background: rgba(255,255,255,0.95);
  margin: 40px auto;
  padding: 40px;
  border-radius: 20px;
  max-width: 800px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

h1 {
  font-family: 'Permanent Marker', cursive;
  font-size: 48px;
  text-align: center;
  color: #22C55E;
  text-shadow: 3px 3px 0px #000;
  margin-bottom: 20px;
}

h2 {
  color: #6D28D9;
  margin-top: 40px;
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid #22C55E;
  font-size: 16px;
  margin-bottom: 15px;
}

button {
  background: #22C55E;
  color: #000;
  font-weight: bold;
  border: none;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16A34A;
  transform: scale(1.05);
}

a {
  color: #22C55E;
  font-weight: bold;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

#qrcode {
  margin-top: 20px;
  text-align: center;
}
</style>
</style>
</head>

<body>
<div class="container">
  <h1>Generador de QR</h1>
  <input type="text" id="text" placeholder="Pega tu enlace aquí">
  <button onclick="generateQR()">Generar QR</button>
  <div id="qrcode"></div>
</div>

<script>
function generateQR() {
  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: document.getElementById("text").value,
    width: 200,
    height: 200
  });
}
</script>

</body>
</html>
