<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>qrflow.tech | QR Facebook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="LogoQ.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z3CQH3G1CM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-Z3CQH3G1CM');
</script>

<style>
body{font-family:Arial;background:#ece6f2;margin:0;text-align:center;color:#6a00a8;}
header{background:linear-gradient(135deg,#6a00a8,#ff2fd1);padding:30px;}
.logo-main{width:220px;margin:auto;}
nav{margin:20px;}
nav a{margin:6px 10px;color:#6a00a8;font-weight:bold;text-decoration:none;}
.container{background:linear-gradient(135deg,#6a00a8,#ff2fd1);padding:30px;border-radius:20px;max-width:600px;margin:auto;color:white;}
input{padding:12px;width:90%;margin:10px;border:none;border-radius:8px;}
button{padding:12px 25px;background:#fff4c2;color:#6a00a8;border:none;border-radius:25px;}
#qrcode{display:flex;justify-content:center;margin-top:25px;}
.download-btn{display:none;margin-top:15px;}
.ad-box{margin:30px auto;height:90px;background:#ddd;display:flex;align-items:center;justify-content:center;}
footer{background:linear-gradient(135deg,#6a00a8,#ff2fd1);color:#fff4c2;padding:20px;margin-top:60px;}
</style>
</head>

<body>

<header><img src="LogoQ.png" class="logo-main"></header>

<nav>...igual que arriba...</nav>

<div class="ad-box">Espacio publicitario</div>

<div class="container">
<h2>QR Facebook</h2>
<input id="url" placeholder="https://facebook.com/usuario">
<button onclick="generateQR()">Generar QR</button>
<div id="qrcode"></div>
<button id="downloadBtn" class="download-btn" onclick="downloadQR()">Descargar QR</button>
</div>

<div class="ad-box">Espacio publicitario</div>

<footer>© 2026 qrflow.tech</footer>

<script>
function generateQR(){qrcode.innerHTML="";new QRCode(qrcode,{text:url.value,width:200,height:200});downloadBtn.style.display="inline-block";}
function downloadQR(){var img=document.querySelector("#qrcode img");var a=document.createElement("a");a.href=img.src;a.download="qr-facebook.png";a.click();}
</script>

</body>
</html>
