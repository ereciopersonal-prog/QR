<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>qrflow.tech | QR WiFi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="LogoQ.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z3CQH3G1CM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-Z3CQH3G1CM');
</script>

</head>
<body style="text-align:center;font-family:Arial;background:#ece6f2;">

<h2>QR WiFi</h2>
<input id="ssid" placeholder="Red"><br>
<input id="password" placeholder="Contraseña"><br>
<button onclick="generateQR()">Generar</button>
<div id="qrcode"></div>

<script>
function generateQR(){
qrcode.innerHTML="";
var wifi="WIFI:T:WPA;S:"+ssid.value+";P:"+password.value+";;";
new QRCode(qrcode,wifi);
}
</script>

</body>
</html>
